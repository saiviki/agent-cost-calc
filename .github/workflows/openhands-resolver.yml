name: Jules Resolver
# Replaced: openhands-resolver PyPI package broken (openhands-ai all yanked, e2b 0.17.x gone)
# Current approach: Jules (Google AI Pro) via google-labs-code/jules-invoke@v1
# Requires: JULES_API_KEY secret (generate at https://jules.google.com → account settings)
on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  jules-fix:
    if: |
      (github.event.label.name == 'fix-me') ||
      (
        (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
        startsWith(github.event.comment.body, '@openhands-agent') &&
        (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'COLLABORATOR')
      ) ||
      (
        github.event_name == 'pull_request_review' &&
        startsWith(github.event.review.body, '@openhands-agent') &&
        (github.event.review.author_association == 'OWNER' || github.event.review.author_association == 'COLLABORATOR')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Invoke Jules
        uses: google-labs-code/jules-invoke@v1
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: main
          prompt: |
            Please fix the following issue in this repository.

            ## Issue: ${{ github.event.issue.title || github.event.pull_request.title }}

            ${{ github.event.issue.body || github.event.comment.body || github.event.review.body }}

            ## Instructions

            1. Analyze the issue and identify the root cause
            2. Implement a minimal, targeted fix — do not refactor unrelated code
            3. Add or update tests if applicable
            4. Ensure CI passes (run any existing test suites)
            5. Create a pull request with a clear description referencing this issue

            Reference issue number: #${{ github.event.issue.number || github.event.pull_request.number }}

      - name: Comment on issue
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = context.payload.issue?.number || context.payload.pull_request?.number;
            if (!issueNumber) return;
            github.rest.issues.createComment({
              issue_number: issueNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🤖 Jules has been invoked to resolve this issue. A pull request will be created when the task completes. Track progress at https://jules.google.com'
            });

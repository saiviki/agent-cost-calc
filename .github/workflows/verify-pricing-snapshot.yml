# verify-pricing-snapshot.yml — fails CI if src/lib/pricing.generated.json
# is out of date vs OpenRouter's live /api/v1/models.
#
# Operator workflow (you do this locally, then push):
#   1. npm run sync-models          # re-fetches OpenRouter, writes the snapshot
#   2. git add src/lib/pricing.generated.json && git commit
#   3. git push                     # CI runs `--check` and must pass
#
# This workflow runs the sync script in --check mode against the checked-in
# snapshot. If a PR introduces a stale snapshot (or someone hand-edits the
# JSON), this fails the build. It does NOT auto-commit on a schedule — the
# operator is in the loop, by design (lineup curation is intentional).

name: Verify pricing snapshot

on:
  push:
    branches: [main]
    paths:
      - "src/lib/pricing.generated.json"
      - "scripts/sync-models.ts"
      - "scripts/model-catalog.ts"
      - "src/lib/models.ts"
      - ".github/workflows/verify-pricing-snapshot.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/lib/pricing.generated.json"
      - "scripts/sync-models.ts"
      - "scripts/model-catalog.ts"
      - "src/lib/models.ts"
      - ".github/workflows/verify-pricing-snapshot.yml"
  # Manual trigger from the Actions tab — useful for a periodic freshness audit.
  workflow_dispatch:

concurrency:
  group: pricing-snapshot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: pricing.generated.json in sync with OpenRouter
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify snapshot matches OpenRouter
        run: npm run sync-models:check
